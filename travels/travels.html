<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
.travel-map-heading {
    margin: 1.5rem 0 1rem;
    font-size: 1.75rem;
    color: var(--primary-color);
}

#map {
    width: 100%;
    height: 500px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 12px 35px rgba(15, 23, 42, 0.15);
    border: 1px solid rgba(37, 99, 235, 0.12);
}

.world-map {
    margin-bottom: 2rem;
}

.leaflet-popup-content-wrapper {
    border-radius: 12px;
}

.leaflet-popup-content {
    margin: 10px 12px;
    line-height: 1.5;
}

.leaflet-popup-content strong {
    display: block;
    margin-bottom: 4px;
    color: var(--primary-color);
    font-size: 1rem;
}

.leaflet-popup-content .popup-date {
    display: block;
    font-size: 0.8rem;
    color: var(--text-light);
    margin-bottom: 6px;
}

.leaflet-popup-content .popup-description {
    margin: 0;
    color: var(--text-dark);
}

@media (max-width: 768px) {
    #map {
        height: 380px;
        border-radius: 14px;
    }
}
</style>

<script>
function initTravelMap() {
    if (typeof window.L === 'undefined') {
        const existingLeafletScript = document.querySelector('script[src*="leaflet.min.js"]');

        if (existingLeafletScript) {
            existingLeafletScript.addEventListener('load', () => initTravelMap(), { once: true });
        } else {
            const leafletScript = document.createElement('script');
            leafletScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
            leafletScript.onload = () => initTravelMap();
            leafletScript.onerror = () => console.error('Leaflet failed to load.');
            document.head.appendChild(leafletScript);
        }

        return;
    }

    // Add new trips here later by copying this structure:
    // { name: 'City, Country', coords: [lat, lng], date: 'Month Year', description: 'Short note' }
    const myTravels = [
        {
            name: 'Tokyo, Japan',
            coords: [35.6762, 139.6503],
            date: 'Spring 2024',
            description: 'Neon nights, sushi, and a city that never seems to sleep.'
        },
        {
            name: 'Paris, France',
            coords: [48.8566, 2.3522],
            date: 'Summer 2023',
            description: 'Art, cafés, and timeless architecture by the Seine.'
        }
    ];

    const map = window.L.map('map', {
        zoomControl: true,
        scrollWheelZoom: true
    }).setView([20, 0], 2);

    window.L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
    }).addTo(map);

    const isDesktop = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

    myTravels.forEach(trip => {
        const marker = window.L.marker(trip.coords, {
            title: trip.name
        }).addTo(map);

        const popupContent = `
            <div class="leaflet-popup-content">
                <strong>${trip.name}</strong>
                <span class="popup-date">${trip.date}</span>
                <p class="popup-description">${trip.description}</p>
            </div>
        `;

        marker.bindPopup(popupContent);

        if (isDesktop) {
            marker.on('mouseover', () => marker.openPopup());
            marker.on('mouseout', () => marker.closePopup());
        }
    });
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initTravelMap);
} else {
    initTravelMap();
}
</script>
