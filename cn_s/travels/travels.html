<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
.leaflet-map-wrapper {
    height: 500px;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    background-color: #f0f0f0;
}

.leaflet-popup-content-wrapper {
    border-radius: 8px;
    border: 2px solid var(--primary-color);
}

.leaflet-popup-content {
    font-family: var(--font-sans);
    color: var(--text-dark);
    margin: 8px 0;
}

.leaflet-popup-content h3 {
    margin-top: 0;
    margin-bottom: 8px;
    color: var(--primary-color);
    font-size: 1.1rem;
    font-weight: 600;
}

.leaflet-popup-content p {
    margin: 4px 0;
    font-size: 0.9rem;
    color: var(--text-light);
}

.popup-button {
    display: inline-block;
    margin-top: 8px;
    padding: 8px 16px;
    background-color: var(--primary-color);
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    transition: background-color 0.3s ease;
    text-decoration: none;
}

.popup-button:hover {
    background-color: var(--secondary-color);
}

.leaflet-marker-icon {
    filter: hue-rotate(200deg) saturate(1.2);
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Location data with coordinates and information
    const travelLocations = [
        {
            id: 'paris',
            name: 'Paris, France',
            continent: 'europe',
            lat: 48.8566,
            lng: 2.3522,
            description: 'The City of Light'
        },
        {
            id: 'london',
            name: 'London, England',
            continent: 'europe',
            lat: 51.5074,
            lng: -0.1278,
            description: 'Historic City'
        },
        {
            id: 'tokyo',
            name: 'Tokyo, Japan',
            continent: 'asia',
            lat: 35.6762,
            lng: 139.6503,
            description: 'Modern Metropolis'
        },
        {
            id: 'bangkok',
            name: 'Bangkok, Thailand',
            continent: 'asia',
            lat: 13.7563,
            lng: 100.5018,
            description: 'City of Angels'
        },
        {
            id: 'cairo',
            name: 'Cairo, Egypt',
            continent: 'africa',
            lat: 30.0444,
            lng: 31.2357,
            description: 'Ancient Wonders'
        },
        {
            id: 'newyork',
            name: 'New York, USA',
            continent: 'americas',
            lat: 40.7128,
            lng: -74.0060,
            description: 'The Big Apple'
        },
        {
            id: 'mexico',
            name: 'Mexico City, Mexico',
            continent: 'americas',
            lat: 19.4326,
            lng: -99.1332,
            description: 'City of Palaces'
        }
        // Add more locations easily by copying this format:
        // { id: 'location-id', name: 'City, Country', continent: 'continent-id', lat: 0.0, lng: 0.0, description: 'Description' }
    ];

    // Initialize Leaflet map
    const map = L.map('travels-map').setView([20, 0], 2);

    // Add OpenStreetMap tile layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19,
        tileSize: 256
    }).addTo(map);

    // Add markers for each location
    travelLocations.forEach(location => {
        const marker = L.marker([location.lat, location.lng], {
            title: location.name
        }).addTo(map);

        // Create popup content with button
        const popupContent = `
            <div class="leaflet-popup-content">
                <h3>${location.name}</h3>
                <p>${location.description}</p>
                <button class="popup-button" onclick="document.getElementById('${location.continent}').scrollIntoView({behavior: 'smooth', block: 'start'})">
                    View Details
                </button>
            </div>
        `;

        marker.bindPopup(popupContent);
    });
});
</script>
